name: 从石墨文档同步数据

on:
  schedule:
    # 每隔一小时同步一次 (UTC 时间，北京时间 = UTC+8)
    - cron: "7 * * * *"
  workflow_dispatch:  # 手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install pandas openpyxl playwright
          python -m playwright install chromium --with-deps

      - name: 从石墨文档同步
        env:
          SHIMO_AUTH: ${{ secrets.SHIMO_AUTH }}
        run: python sync_from_shimo.py
        continue-on-error: true

      - name: 转换为天极标准化数据底表
        run: python convert_for_taiji.py

      - name: 提交更新
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://${GH_PAT}@github.com/${{ github.repository }}.git"
          git add "2026年海外客户投诉台账.xlsx" "海外客诉台账_标准化数据.xlsx"
          if git diff --staged --quiet; then
            echo "数据无变化，跳过提交"
          else
            git commit -m "data: 自动同步石墨文档 $(date +'%Y-%m-%d %H:%M')"
            git pull --rebase origin main
            git push
            echo "已提交并推送更新"
          fi
